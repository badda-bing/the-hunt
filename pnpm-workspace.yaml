# Pre-approve native-build scripts for declared dependencies so
# `pnpm install` doesn't prompt on fresh clones.
onlyBuiltDependencies:
  - better-sqlite3

# Workspace members — post-M6 restructure. the-hunt is a pnpm workspace
# with UI-free modules under packages/ and composition wrappers under
# apps/. The framework is consumed via link:../baddabing-framework from
# each workspace member.
packages:
  - 'packages/*'
  - 'apps/*'
